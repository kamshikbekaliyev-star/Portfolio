<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biz bilan aloqa</title>
    <link rel="stylesheet" href="./contact.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <a href="./loyihalarim.html" class="back-btn">
        <i class="fas fa-arrow-left"></i> Orqaga
    </a>

    <div class="contact-container">
        <div class="contact-info">
            <h2>Biz bilan bog'laning</h2>
            <p class="info-text">Savollaringiz yoki takliflaringiz bormi? Quyidagi ma'lumotlar orqali bizga murojaat qiling yoki formani to'ldiring.</p>
            
            <div class="details">
                <div class="detail-item">
                    <i class="fas fa-map-marker-alt"></i>
                    <div>
                        <h3>Manzil</h3>
                        <p>Toshkent shahri, OltinTopgan Mahallasi 186-uy</p>
                    </div>
                </div>
                <div class="detail-item">
                    <i class="fas fa-phone-alt"></i>
                    <div>
                        <h3>Telefon</h3>
                        <p>+998 (95) 056-23-75</p>
                    </div>
                </div>
                <div class="detail-item">
                    <i class="fas fa-envelope"></i>
                    <div>
                        <h3>Email</h3>
                        <p>kamshikbek@gmail.com</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="contact-form-box">
            <h2>Xabar yuborish</h2>
            <form action="#" method="POST">
                <div class="input-group">
                    <input type="text" id="name" required placeholder=" ">
                    <label for="name">Ismingiz:</label>
                </div>
                <div class="input-group">
                    <input type="email" id="email" required placeholder=" ">
                    <label for="email">Email manzilingiz:</label>
                </div>
                <div class="input-group">
                    <textarea id="message" rows="5" required placeholder=" "></textarea>
                    <label for="message">Xabaringiz:</label>
                </div>
                <button type="submit" class="submit-btn">Yuborish:<i class="fas fa-paper-plane"></i></button>
            </form>
        </div>
    </div>

</body>
</html>
